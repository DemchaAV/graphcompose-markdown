# Dependabot configuration for graph-compose-markdown.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: maven
    directory: "/"
    # Send update PRs to the integration branch, not the default branch.
    # Releases are cut from `develop` then merged to `main`.
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - maven
    commit-message:
      prefix: deps
      include: scope
    groups:
      maven-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
