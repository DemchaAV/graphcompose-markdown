name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    # Run CI for any incoming PR regardless of base branch so feature
    # branches targeting `develop` also exercise the full pipeline.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and run tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling matrix jobs on the first failure — a regression
      # on one JDK is informative even while other JDKs are still running.
      fail-fast: false
      matrix:
        # 17 = baseline, 21 = previous LTS, 25 = current LTS.
        java: ['17', '21', '25']
    env:
      # PDF rendering touches AWT; force headless on the runners.
      JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Temurin JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B -ntp clean verify

      - name: Build the detached CLI and examples modules
        # cli/ and examples/ are intentionally outside the reactor (kept out of the
        # published artifact), so `verify` above never touches them. Build them here
        # on the baseline JDK so an API change in the library that breaks the CLI
        # fat-jar or an example cannot ship CI-green. install -DskipTests publishes
        # the just-verified library to the local repo the detached poms resolve from.
        if: matrix.java == '17'
        run: |
          ./mvnw -B -ntp install -DskipTests
          ./mvnw -B -ntp -f cli/pom.xml package
          ./mvnw -B -ntp -f examples/pom.xml test-compile

      - name: Generate Javadoc
        # Run only on the baseline JDK — one pass is enough to catch broken
        # @link references; Javadoc output is identical across JVMs.
        if: matrix.java == '17'
        run: ./mvnw -B -ntp javadoc:javadoc
