name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    # Run CI for any incoming PR regardless of base branch so feature
    # branches targeting `develop` also exercise the full pipeline.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-lockstep:
    # The detached cli/ and examples/ modules pin the library via gcmd.version (and
    # carry their own <version>). At the v0.2.0 release those literals drifted from
    # the root version and the detached-module build broke on the tagged commit.
    # This guard fails fast — before any JDK matrix time — when the five version
    # literals disagree, so a release-prep commit cannot tag with the drift.
    name: Detached modules track the library version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Compare version literals
        run: |
          extract() { sed -n "s/.*<$2>\([^<]*\)<\/$2>.*/\1/p" "$1" | head -1; }
          root=$(extract pom.xml version)
          gcmd_cli=$(extract cli/pom.xml gcmd.version)
          gcmd_examples=$(extract examples/pom.xml gcmd.version)
          mod_cli=$(extract cli/pom.xml version)
          mod_examples=$(extract examples/pom.xml version)
          if [ -z "$root" ] || [ -z "$gcmd_cli" ] || [ -z "$gcmd_examples" ]; then
            echo "::error::Could not extract version literals — pom layout changed; update this guard."
            exit 1
          fi
          echo "root=$root cli.gcmd=$gcmd_cli examples.gcmd=$gcmd_examples cli.module=$mod_cli examples.module=$mod_examples"
          fail=0
          for v in "$gcmd_cli" "$gcmd_examples" "$mod_cli" "$mod_examples"; do
            if [ "$v" != "$root" ]; then fail=1; fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::Version drift: cli/examples must track the root <version> ($root)." \
                 "Bump gcmd.version and the module <version> in cli/pom.xml and examples/pom.xml" \
                 "in the same commit that changes the root version (see the v0.2.0 release lesson)."
            exit 1
          fi

  build-and-test:
    name: Build and run tests (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      # Don't cancel sibling matrix jobs on the first failure — a regression
      # on one JDK is informative even while other JDKs are still running.
      fail-fast: false
      matrix:
        # 17 = baseline, 21 = previous LTS, 25 = current LTS.
        java: ['17', '21', '25']
    env:
      # PDF rendering touches AWT; force headless on the runners.
      JAVA_TOOL_OPTIONS: -Djava.awt.headless=true

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Temurin JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and run tests
        run: ./mvnw -B -ntp clean verify

      - name: Build the detached CLI and examples modules
        # cli/ and examples/ are intentionally outside the reactor (kept out of the
        # published artifact), so `verify` above never touches them. Build them here
        # on the baseline JDK so an API change in the library that breaks the CLI
        # fat-jar or an example cannot ship CI-green. install -DskipTests publishes
        # the just-verified library to the local repo the detached poms resolve from.
        if: matrix.java == '17'
        run: |
          ./mvnw -B -ntp install -DskipTests
          ./mvnw -B -ntp -f cli/pom.xml package
          ./mvnw -B -ntp -f examples/pom.xml test-compile

      - name: Generate Javadoc
        # Run only on the baseline JDK — one pass is enough to catch broken
        # @link references; Javadoc output is identical across JVMs.
        if: matrix.java == '17'
        run: ./mvnw -B -ntp javadoc:javadoc
